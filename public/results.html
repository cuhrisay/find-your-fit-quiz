<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Find Your Fit Results — Cushion Your Assets</title>
<style>
  /* Brand colors from the CYA blog/email guide: red #A61111, yellow #FFC700,
     dark #2C2C2C, off-white #F4F3F1, Poppins font */
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Epilogue:wght@700&display=swap');

  body {
    font-family: 'Poppins', sans-serif;
    color: #2C2C2C;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    /* Sky placeholder: soft blue-to-cream fade + a few cloud puffs, standing
       in for a real sky/cloud background image until one is uploaded (see
       public/assets/ - swap this background block for a background-image
       once that's in place). */
    background-color: #5EA2D9;
    background-image:
      radial-gradient(70px 30px at 12% 7%, rgba(255,255,255,0.9), transparent 70%),
      radial-gradient(95px 38px at 9% 10%, rgba(255,255,255,0.85), transparent 70%),
      radial-gradient(80px 32px at 88% 5%, rgba(255,255,255,0.85), transparent 70%),
      radial-gradient(100px 42px at 85% 9%, rgba(255,255,255,0.8), transparent 70%),
      linear-gradient(180deg, #5EA2D9 0%, #a9cfec 30%, #F4F3F1 65%);
    background-repeat: no-repeat;
    background-size: 100% 100%;
  }
  .page {
    max-width: 560px;
    width: 100%;
  }
  .brand-mark {
    text-align: center;
    margin: 0 auto 28px;
    white-space: nowrap;
  }
  .brand-mark .cushion,
  .brand-mark .your-assets {
    font-family: 'Epilogue', sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .brand-mark .cushion {
    color: #A61111;
  }
  .brand-mark .your-assets {
    color: #2C2C2C;
    margin-left: 8px;
  }
  .card {
    background: #ffffff;
    max-width: 560px;
    width: 100%;
    padding: 40px;
    border-radius: 4px;
    border: 1px solid #e8e8e8;
  }
  h1 {
    font-family: 'Epilogue', sans-serif;
    font-size: 26px;
    font-weight: 700;
    white-space: nowrap;
    margin: 0 0 8px;
  }
  .spec-table {
    margin: 24px 0;
    border-top: 1px solid #eee;
  }
  .spec-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
  }
  .spec-label {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555555;
  }
  .spec-value {
    font-weight: 500;
  }
  .message {
    font-size: 16px;
    line-height: 1.6;
    margin: 24px 0;
  }
  .message h3 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #A61111;
    margin: 24px 0 8px;
  }
  .message h3:first-child {
    margin-top: 0;
  }
  .message p {
    margin: 0 0 14px;
  }
  .message ul {
    margin: 0 0 14px;
    padding-left: 20px;
  }
  .message li {
    margin: 0 0 8px;
  }
  .message a {
    color: #A61111;
  }
  .cta {
    display: inline-block;
    background: #A61111;
    color: #fff;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 4px;
    font-weight: 500;
    margin-top: 8px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .error {
    color: #A61111;
  }
  .site-footer {
    max-width: 560px;
    width: 100%;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid #e0dfdb;
    text-align: center;
    color: #7a7a7a;
    font-size: 13px;
    line-height: 1.7;
  }
  .site-footer img {
    display: block;
    height: 40px;
    width: auto;
    margin: 0 auto 12px;
    opacity: 0.85;
  }
  .site-footer a {
    color: #7a7a7a;
    text-decoration: underline;
  }
  .site-footer .tagline {
    margin: 0 0 4px;
  }
</style>
</head>
<body>
  <div class="page">
    <!-- Placeholder wordmark until a real logo/wordmark image is dropped in
         public/assets/ - swap this div for an <img class="site-logo"> once
         that's available. -->
    <div class="brand-mark">
      <span class="cushion">Cushion</span>
      <span class="your-assets">Your Assets</span>
    </div>
    <div class="card" id="card">
      <div class="loading" id="loading">Finding your fit…</div>
    </div>
    <div class="site-footer">
      <img alt="Cushion Your Assets" src="https://images.squarespace-cdn.com/content/v1/68e81b678021d5189cf1f247/9d1b0cf7-2a18-4d5c-8624-43fd49dbd83a/Cushion+Your+Assets+Pelvic+Pain+Cushion+Logo+with+Clouds.jpg?format=200w" />
      <p class="tagline">Cushion Your Assets — the patented pelvic pain relief cushion.</p>
      <p>
        Questions about your fit? Email <a href="mailto:support@cushionyourassets.com">support@cushionyourassets.com</a>
        or visit <a href="https://cushionyourassets.com">cushionyourassets.com</a>.
      </p>
      <p>&copy; 2026 Cushion Your Assets. All rights reserved.</p>
    </div>
  </div>

  <script>
    // ACTION NEEDED: set this to your actual deployed Vercel domain, or leave
    // as a relative path if this page is served from the same domain as the
    // API functions (recommended - simplest setup).
    const RESULT_ENDPOINT = '/api/quiz-result';

    // Tally's redirect URL should be set to something like:
    //   https://yourdomain.vercel.app/results.html?id=@SubmissionID
    // (use Tally's "@" merge syntax in the redirect URL field to insert the
    // real submission ID - see Tally's Redirect on Completion settings)
    const params = new URLSearchParams(window.location.search);
    const submissionId = params.get('id');

    const card = document.getElementById('card');

    function renderResult(data) {
      const r = data.result;
      let secondCushionHtml = '';
      if (r.secondCushion && r.secondCushion.suggestion) {
        const s = r.secondCushion.suggestion;
        const valueText = s.firmnessRange ? `${s.thickness} — ${s.firmnessRange}` : s.thickness;
        secondCushionHtml = `
          <div class="spec-row">
            <span class="spec-label">Also consider</span>
            <span class="spec-value">${valueText}</span>
          </div>`;
      }
      card.innerHTML = `
        <h1>We Have Your Fit! ✅</h1>
        <div class="spec-table">
          <div class="spec-row">
            <span class="spec-label">Product</span>
            <span class="spec-value">${r.product}</span>
          </div>
          <div class="spec-row">
            <span class="spec-label">Firmness</span>
            <span class="spec-value">${r.firmness}</span>
          </div>
          <div class="spec-row">
            <span class="spec-label">Size</span>
            <span class="spec-value">${r.size}</span>
          </div>
          <div class="spec-row">
            <span class="spec-label">Thickness</span>
            <span class="spec-value">${r.thickness}</span>
          </div>
          ${secondCushionHtml}
        </div>
        <div class="message">${data.message}</div>
        <a class="cta" href="${r.orderUrl}">${r.orderLabel}</a>
      `;
    }

    function renderError(msg) {
      card.innerHTML = `<div class="loading error">${msg}</div>`;
    }

    async function poll() {
      if (!submissionId) {
        renderError(
          "We couldn't find your submission. Please try the quiz again, or email us at support@cushionyourassets.com."
        );
        return;
      }
      try {
        const res = await fetch(`${RESULT_ENDPOINT}?id=${encodeURIComponent(submissionId)}`);
        const data = await res.json();
        if (data.status === 'ready') {
          renderResult(data);
        } else if (data.status === 'pending') {
          setTimeout(poll, 1500);
        } else {
          renderError(
            "Something went wrong finding your result. We've also emailed a copy — check your inbox, or email us at support@cushionyourassets.com."
          );
        }
      } catch (err) {
        renderError(
          "Something went wrong loading your result. Check your email for a copy, or reach out at support@cushionyourassets.com."
        );
      }
    }

    // Give the webhook a head start before the first poll, since it hasn't
    // even been triggered until roughly the moment this page loads.
    setTimeout(poll, 800);

    // Stop polling forever if something's badly wrong - cap at ~30 seconds.
    setTimeout(() => {
      if (card.innerHTML.includes('Finding your fit')) {
        renderError(
          "This is taking longer than expected. We've emailed your result — check your inbox, or reach out at support@cushionyourassets.com."
        );
      }
    }, 30000);
  </script>
</body>
</html>
